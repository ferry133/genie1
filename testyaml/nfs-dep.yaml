
kind: Deployment
#apiVersion: extensions/v1beta1
apiVersion: apps/v1   # Larry: updated to apps/v1 to avoid warning :: "extensions/v1beta1" is deprecated in v1.16+, unavailable in v1.22+
metadata:
  name: nfs-client-provisioner
  namespace: default     # Larry: Added namespace to match ServiceAccount namespace
spec:
  replicas: 1
  selector:         # Larry: added selector to avoid error :: spec.selector: Required value
    matchLabels:
      app: nfs-client-provisioner
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: nfs-client-provisioner
    spec:
      serviceAccountName: nfs-client-provisioner
      containers:
        - name: nfs-client-provisioner
          image: quay.io/external_storage/nfs-client-provisioner:latest
          volumeMounts:
            - name: nfs-client-root
              mountPath: /persistentvolumes
          env:
            - name: PROVISIONER_NAME
              value: my-nfs-provisioner
            - name: NFS_SERVER
              value: 10.9.1.12
            - name: NFS_PATH
              value: /volume1/homedirect
      volumes:
        - name: nfs-client-root
          nfs:
            server: 10.9.1.12
            path: /volume1/homedirect
