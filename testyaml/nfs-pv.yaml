apiVersion: v1
kind: PersistentVolume
metadata:
  name: nfs-pv
spec:
  capacity:
    storage: 10Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs-storageclass
  mountOptions:
    - hard
    - nfsvers=4.1
  nfs:
    path: /volume2/homedirect
    server: 10.9.1.12

---
